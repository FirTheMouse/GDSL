<!DOCTYPE html>
   <html>
      <body>
         <p>Hello</p>
            <button onclick="postTo('/wub', this)" style="cursor:pointer;padding:8px 16px;background-color:#374151;color:white;border:none;border-radius:4px;font-size:14px;">
               <span>Click Me</span>
            </button>
               <script>

               async function postTo(route, el) {
                  const response = await fetch(route, {
                      method: 'POST',
                      body: el.id
                  });
                  document.getElementById('target').innerHTML = await response.text();
               }
            </script>
               <div id="target">
            </div>
         </body>
      </html>
